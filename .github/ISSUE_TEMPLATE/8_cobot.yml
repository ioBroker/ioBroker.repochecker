---
name: COPILOT - suggest changes to be implemented by GitHub Copilot
description: Suggest changes to be implemented by GitHub Copilot (for maintainers only)
title: "[COPILOT] "
labels: ["TRIAGE", "copilot"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        > [!WARNING]
        > **This issue type is reserved exclusively for tasks intended to be implemented by GitHub Copilot.**
        > It must NOT be used for any other purpose.
        > **Any issue not designed to be handled by Copilot will be closed immediately without further notice.**

  - type: textarea
    id: description
    attributes:
      label: Description of task
      description: Please provide a detailed description of the changes you want GitHub Copilot to implement
      placeholder: Describe the changes to be implemented
    validations:
      required: true
