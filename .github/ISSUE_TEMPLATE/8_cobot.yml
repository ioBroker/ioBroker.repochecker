---
name: COPILOT - suggest changes to be implemented by GitHub Copilot
description: Suggest changes to be implemented by GitHub Copilot (for maintainers only)
title: "[COPILOT] "
labels: ["TRIAGE", "copilot"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        > [!WARNING]
        > **This issue type is reserved exclusively for tasks intended to be implemented by GitHub Copilot.**
        > It must NOT be used for any other purpose.
        > **Any issue not designed to be handled by Copilot will be closed immediately without further notice.**

  - type: textarea
    id: description
    attributes:
      label: Description of task
      description: Please provide a detailed description of the changes you want GitHub Copilot to implement
      placeholder: Describe the changes to be implemented
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        > Additional instructions for @copilot:
        >
        > Do not add any comment which causes this issue to be closed like 'fixes:...' to the generated PR or any commit 
        > created during processing this issue. This issue should be closed manually by maintainer only.
        >
        > Do not try to extend numbering range, so do not create any M10000_xxx.js script. If splitting code into an extra 
        > file seems to be appropiate, add it to the best matching area or the area requested by this issue and name the
        > file like the are uesed using two underscores. See M8900_Dependabot.js as an example.
